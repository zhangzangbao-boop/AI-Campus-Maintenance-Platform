server:
  port: 9002

spring:
  application:
    name: qiyun-ai-service

  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}

# AI 服务配置
ai:
  enabled: ${AI_ENABLED:false}
  provider: ${AI_PROVIDER:deepseek}
  base-url: ${AI_BASE_URL:https://api.deepseek.com}
  api-key: ${DEEPSEEK_API_KEY:}
  model: ${AI_MODEL:deepseek-chat}
  timeout-seconds: ${AI_TIMEOUT_SECONDS:20}

# Chroma 向量数据库配置
chroma:
  url: ${CHROMA_URL:http://localhost:8000}
  collection: ${CHROMA_COLLECTION:campus_maintenance_kb}
  top-k: ${RAG_TOP_K:5}
  timeout-seconds: ${CHROMA_TIMEOUT_SECONDS:10}

# Embedding 模型配置
embedding:
  enabled: ${EMBEDDING_ENABLED:true}
  model-path: ${EMBEDDING_MODEL_PATH:}
  tokenizer-path: ${EMBEDDING_TOKENIZER_PATH:}
  dimensions: ${EMBEDDING_DIMENSIONS:384}
  max-sequence-length: ${EMBEDDING_MAX_SEQ_LEN:512}
  batch-size: ${EMBEDDING_BATCH_SIZE:32}

# 内部服务密钥
internal:
  service:
    secret: ${INTERNAL_SERVICE_SECRET:}
