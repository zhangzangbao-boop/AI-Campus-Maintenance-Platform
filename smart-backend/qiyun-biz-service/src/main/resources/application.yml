server:
  port: 9001

spring:
  application:
    name: qiyun-biz-service

  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848

  datasource:
    url: jdbc:mysql://127.0.0.1:3306/repairdb?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30000
      max-lifetime: 1800000
      minimum-idle: 5
      maximum-pool-size: 10
      validation-timeout: 5000

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        cache:
          use_second_level_cache: false
          use_query_cache: false
        connection:
          isolation: 2
    show-sql: true

  transaction:
    default-timeout: 30

backup:
  directory: ./backups
  retention-days: 30
  auto-enabled: false
  cron: "0 30 2 * * ?"

jwt:
  secret: mySecretKeyForCampusMaintenanceSystem123456
  expiration-ms: 604800000

ai:
  enabled: true
  provider: deepseek
  base-url: https://api.deepseek.com
  api-key: sk-fca211fc980749d8acb54489dfd706e0
  model: deepseek-chat
  timeout-seconds: 20
  thinking:
    enabled: false