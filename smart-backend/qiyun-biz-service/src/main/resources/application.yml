server:
  port: 9001

spring:
  application:
    name: qiyun-biz-service

  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}

  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/repairdb?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30000
      max-lifetime: 1800000
      minimum-idle: 5
      maximum-pool-size: 10
      validation-timeout: 5000

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        cache:
          use_second_level_cache: false
          use_query_cache: false
        connection:
          isolation: 2
    show-sql: true

  transaction:
    default-timeout: 30

backup:
  directory: ./backups
  retention-days: 30
  auto-enabled: false
  cron: "0 30 2 * * ?"

jwt:
  secret: ${JWT_SECRET:}
  expiration-ms: ${JWT_EXPIRATION_MS:604800000}

ai:
  enabled: ${AI_ENABLED:false}
  provider: ${AI_PROVIDER:deepseek}
  base-url: ${AI_BASE_URL:https://api.deepseek.com}
  api-key: ${DEEPSEEK_API_KEY:}
  model: ${AI_MODEL:deepseek-chat}
  timeout-seconds: ${AI_TIMEOUT_SECONDS:20}
  thinking:
    enabled: false