server:
  port: 8070

spring:
  application:
    name: qiyun-gateway

  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}

    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      routes:
        # 转发到 qiyun-ai-service（优先级最高，精确匹配）
        - id: ai-service-route
          uri: lb://qiyun-ai-service
          predicates:
            - Path=/api/ai/**
          order: 0

        # 转发到 qiyun-biz-service（兼容原业务接口，匹配所有其他 /api/**）
        - id: biz-service-route
          uri: lb://qiyun-biz-service
          predicates:
            - Path=/api/**
          order: 1

      # 全局 CORS 配置
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins:
              - "http://localhost:5173"
              - "http://127.0.0.1:5173"
            allowed-methods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowed-headers: "*"
            allow-credentials: true
            max-age: 3600

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always