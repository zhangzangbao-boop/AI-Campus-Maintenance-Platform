server:
  port: 8070

spring:
  application:
    name: qiyun-gateway

  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}

    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      routes:
        # WebSocket route to qiyun-ops-service
        - id: websocket-route
          uri: lb:ws://qiyun-ops-service
          predicates:
            - Path=/ws/**
          order: 0

        # AI service route
        - id: ai-service-route
          uri: lb://qiyun-ai-service
          predicates:
            - Path=/api/ai/**
          order: 1

        # User authentication route
        - id: user-auth-route
          uri: lb://qiyun-user-service
          predicates:
            - Path=/api/auth/**
          order: 2

        # Admin user management route
        - id: admin-users-route
          uri: lb://qiyun-user-service
          predicates:
            - Path=/api/admin/users/**
          order: 3

        # User API route
        - id: users-route
          uri: lb://qiyun-user-service
          predicates:
            - Path=/api/users/**
          order: 4

        - id: upload-static-route
          uri: lb://qiyun-repair-service
          predicates:
            - Path=/uploads/**
          order: 5

        - id: repair-service-route
          uri: lb://qiyun-repair-service
          predicates:
            - Path=/api/repair-orders/**,/api/tasks/**,/api/staff/**,/api/categories/**,/api/upload/**
          order: 5

        # Admin repair route
        - id: admin-repair-route
          uri: lb://qiyun-repair-service
          predicates:
            - Path=/api/admin/repair-orders/**,/api/admin/transfer-requests/**
          order: 6

        # Notification route
        - id: notification-route
          uri: lb://qiyun-ops-service
          predicates:
            - Path=/api/notifications/**,/api/announcements/**
          order: 7

        # Knowledge base route
        - id: knowledge-base-route
          uri: lb://qiyun-ops-service
          predicates:
            - Path=/api/knowledge-base/**
          order: 8

        # Admin operations route
        - id: admin-ops-route
          uri: lb://qiyun-ops-service
          predicates:
            - Path=/api/admin/audit-logs/**,/api/admin/system-config/**,/api/admin/backup/**,/api/admin/knowledge-base/**,/api/admin/stats/**,/api/admin/feedbacks/**,/api/admin/announcements/**,/api/admin/export,/api/admin/export/**
          order: 9

        # Compatibility fallback route for remaining /api paths
        - id: biz-service-route
          uri: lb://qiyun-biz-service
          predicates:
            - Path=/api/**
          order: 10

      # Global CORS configuration
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins:
              - "http://localhost:5173"
              - "http://127.0.0.1:5173"
            allowed-methods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowed-headers: "*"
            allow-credentials: true
            max-age: 3600

# Actuator configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
