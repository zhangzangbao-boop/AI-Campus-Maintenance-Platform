server:
  port: 0

spring:
  application:
    name: qiyun-gateway-test

  cloud:
    nacos:
      discovery:
        enabled: false

    gateway:
      discovery:
        locator:
          enabled: false

      routes:
        # 转发到 qiyun-ai-service（优先级最高，精确匹配）
        - id: ai-service-route
          uri: lb://qiyun-ai-service
          predicates:
            - Path=/api/ai/**
          order: 0

        # 转发到 qiyun-user-service（认证服务，精确匹配）
        - id: user-auth-route
          uri: lb://qiyun-user-service
          predicates:
            - Path=/api/auth/**
          order: 1

        # 转发到 qiyun-biz-service（兼容原业务接口，匹配所有其他 /api/**）
        - id: biz-service-route
          uri: lb://qiyun-biz-service
          predicates:
            - Path=/api/**
          order: 10

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always