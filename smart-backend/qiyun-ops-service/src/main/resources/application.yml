server:
  port: ${OPS_SERVICE_PORT:9005}

spring:
  application:
    name: qiyun-ops-service

  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}

  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/repairdb?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=UTF-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

# JWT 配置
jwt:
  secret: ${JWT_SECRET:}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

# 内部服务密钥
internal:
  service:
    secret: ${INTERNAL_SERVICE_SECRET:}

# 备份配置
backup:
  directory: ${BACKUP_DIRECTORY:./backups}
  retention-days: ${BACKUP_RETENTION_DAYS:30}
  auto-enabled: ${BACKUP_AUTO_ENABLED:false}
  cron: ${BACKUP_CRON:0 30 2 * * ?}

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# 日志配置
logging:
  level:
    root: INFO
    com.qiyun.opsservice: DEBUG
    org.springframework.security: INFO