server:
  port: 9005

spring:
  application:
    name: qiyun-ops-service

  cloud:
    nacos:
      discovery:
        enabled: false

  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  h2:
    console:
      enabled: true

jwt:
  secret: test-jwt-secret-key-for-ops-service-testing-only-minimum-256-bits-required
  expiration-ms: 86400000

backup:
  directory: ./target/test-backups

logging:
  level:
    root: INFO
    com.qiyun.opsservice: DEBUG