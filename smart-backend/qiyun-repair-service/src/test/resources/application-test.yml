server:
  port: 0

spring:
  application:
    name: qiyun-repair-service-test

  # 禁用 Nacos
  cloud:
    nacos:
      discovery:
        enabled: false

  # 使用 H2 内存数据库
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  # 禁用文件上传限制
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

# 测试用 JWT 配置
jwt:
  secret: test-jwt-secret-key-for-repair-service-testing-only-minimum-256-bits-required
  expiration-ms: 86400000

# 测试用文件上传配置
upload:
  path: ./target/test-uploads

# AI 配置（测试时禁用）
ai:
  enabled: false

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# 日志配置
logging:
  level:
    com.qiyun: DEBUG
    org.springframework.web: INFO