server:
  port: 0

spring:
  application:
    name: qiyun-user-service-test

  cloud:
    nacos:
      discovery:
        enabled: false

  datasource:
    url: jdbc:h2:mem:user_service_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    show-sql: true

  h2:
    console:
      enabled: false

jwt:
  secret: testSecretKeyForTestingPurposesOnly123456789
  expiration-ms: 604800000

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always